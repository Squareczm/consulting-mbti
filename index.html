<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CBTI — 管理咨询顾问人格测试</title>
  <meta name="description" content="CBTI (Consultant Behavior Type Indicator) — 一个不太正经的管理咨询顾问性格测试。30 道题，16 种人格，找到属于你的咨询灵魂。">
  <meta property="og:title" content="CBTI — 管理咨询顾问人格测试">
  <meta property="og:description" content="30 道题，16 种咨询顾问人格，你是哪一种？">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bubble-canvas"></canvas>
  <button id="lang-toggle" class="lang-toggle" onclick="switchLang()">EN</button>

  <!-- 开屏页 -->
  <div id="screen-landing" class="screen active">
    <div class="landing-content">
      <div class="logo-area">
        <div class="hero-image">
          <img src="hero.jpg" alt="Consulting" />
        </div>
        <h1 class="title">
          <span class="title-main">CBTI</span>
          <span class="title-sub">Consultant Behavior Type Indicator</span>
        </h1>
      </div>
      <p class="tagline">一个不太正经的管理咨询顾问性格测试</p>
      <p class="desc">30 道题 · 16 种顾问人格 · 找到你的甲方克星</p>
      <button class="btn-primary" onclick="startQuiz()">
        <span>进场</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
      </button>
      <p class="disclaimer">纯属娱乐，升职加薪请看 360 反馈</p>
    </div>
    <div class="wave-bottom">
      <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
        <defs>
          <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:rgba(196,154,42,0.08)"/>
            <stop offset="50%" style="stop-color:rgba(26,31,54,0.06)"/>
            <stop offset="100%" style="stop-color:rgba(196,154,42,0.08)"/>
          </linearGradient>
          <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:rgba(26,31,54,0.04)"/>
            <stop offset="100%" style="stop-color:rgba(196,154,42,0.05)"/>
          </linearGradient>
        </defs>
        <path class="wave wave-1" d="M0,100 C240,160 480,40 720,100 C960,160 1200,40 1440,100 L1440,200 L0,200 Z" fill="url(#waveGrad1)"/>
        <path class="wave wave-2" d="M0,120 C360,60 720,160 1080,90 C1260,60 1380,110 1440,120 L1440,200 L0,200 Z" fill="url(#waveGrad2)"/>
      </svg>
    </div>
  </div>

  <!-- 答题页 -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text">
        <span id="question-num">1</span> / 30
        <span class="depth-indicator" id="depth-indicator">📋 实习生</span>
      </div>
    </div>
    <div class="quiz-body">
      <div class="question-card" id="question-card">
        <p class="question-text" id="question-text"></p>
      </div>
      <div class="options-container" id="options-container"></div>
    </div>
  </div>

  <!-- 计算中 -->
  <div id="screen-calculating" class="screen">
    <div class="calc-content">
      <div class="calc-anim">
        <div class="calc-circle">
          <div class="calc-ring"></div>
          <div class="calc-emoji">💼</div>
        </div>
      </div>
      <p class="calc-text" id="calc-text">正在分析你的咨询灵魂...</p>
      <div class="calc-depth" id="calc-depth">
        <span class="depth-num">0</span><span class="depth-unit">h</span>
      </div>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="screen-result" class="screen">
    <div class="result-content" id="result-content"></div>
  </div>

  <script src="questions.js"></script>
  <script src="types.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
